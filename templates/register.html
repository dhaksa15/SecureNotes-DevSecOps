{% extends "base.html" %}
{% block title %}Register — SecureNotes{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <h3 class="mb-1">Create account</h3>
    <p class="text-muted mb-4">Start your private notes vault.</p>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm password</label>
        <input class="form-control" type="password" name="confirm" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Register</button>
    </form>
    <p class="text-muted mt-3 mb-0 text-center">Already have one? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>
{% endblock %}
